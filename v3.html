<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Māori Rock Art | V3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0e;
            --text-color: #f0f0f0;
            --accent-color: #c9a063;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        #scene-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        div[style*="Ready!"], .splat-status, .splat-button {
            display: none !important;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 0%, rgba(13, 13, 14, 0.7) 100%);
        }
        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .info-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 16px;
            max-width: 320px;
            pointer-events: auto;
        }
        .info-card h3 {
            margin-top: 0;
            color: var(--accent-color);
            font-family: 'Outfit', sans-serif;
        }
        .info-card p {
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.7;
            margin: 0;
        }
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(201, 160, 99, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-msg {
            display: none;
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-top: 15px;
        }
        .controls-hint {
            font-size: 0.7rem;
            opacity: 0.3;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Restoring Digital Heritage...</p>
        <div id="error-msg"></div>
    </div>
    <div id="scene-container"></div>
    <div class="overlay">
        <header>
            <h1>MĀORI ROCK ART</h1>
            <p style="opacity:0.5; font-weight:300;">Digital Preservation | V3 Prototype</p>
        </header>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div class="info-card">
                <h3>Heritage in High-Fidelity</h3>
                <p>Digital twin of the rock art ensemble. High-precision neural rendering preserves ancient pigments and rock textures.</p>
            </div>
            <div class="controls-hint">Move Mouse to Explore Surface</div>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.4.0/build/gaussian-splats-3d.module.js"
            }
        }
    </script>
    <script type="module" src="viewer_v3.js"></script>
</body>
</html>
